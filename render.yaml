services:
  - type: web
    name: mesa-it
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: AUTH_DISALLOW_DEMO_PASSWORDS
        value: "true"
      - key: DB_FILE
        value: /var/data/runtime/db.json
      - key: ALLOW_PRODUCTION_SEED
        value: "true"
      - key: DB_BACKUP_ENABLE
        value: "true"
      - key: DB_BACKUP_KEEP
        value: "30"
      - key: CORS_ORIGINS
        sync: false
      - key: QR_SIGNING_SECRET
        sync: false
    disk:
      name: mesa-it-data
      mountPath: /var/data
      sizeGB: 1
